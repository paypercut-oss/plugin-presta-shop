name: Release Magento Module ZIP

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version + artifact name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.1.0
          VERSION="${TAG#v}"                # 1.1.0
          NAME="paypercut-presta-shop-${VERSION}.zip"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=paypercut.zip" >> "$GITHUB_OUTPUT"

      - name: Sync config.xml version to tag
        shell: bash
        run: |
          set -euo pipefail
          test -f config.xml
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          version = os.environ["VERSION"]

          tree = ET.parse("config.xml")
          root = tree.getroot()

          version_el = root.find("version")
          if version_el is None:
              raise SystemExit("config.xml does not contain <version>")

          version_el.text = version

          tree.write("config.xml", encoding="UTF-8", xml_declaration=True)
          PY
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Build ZIP (module under paypercut/)
        shell: bash
        run: |
          set -euo pipefail

          ZIP="${{ steps.meta.outputs.zip_name }}"
          PKG_ROOT="$(pwd)"
          STAGE_DIR="$(mktemp -d)"
          MODULE_DIR="${STAGE_DIR}/paypercut"

          mkdir -p dist
          rm -f "dist/${ZIP}"
          mkdir -p "${MODULE_DIR}"

          # Basic sanity checks
          test -f config.xml
          test -f index.php

          # Copy module contents into staging folder under paypercut/
          rsync -a ./ "${MODULE_DIR}/" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "vendor/" \
            --exclude "node_modules/" \
            --exclude ".idea/" \
            --exclude ".vscode/" \
            --exclude "internal/" \
            --exclude "dist/" \
            --exclude ".DS_Store"

          # Build zip so it contains paypercut/... at root
          pushd "${STAGE_DIR}" >/dev/null
          zip -r "${PKG_ROOT}/dist/${ZIP}" "paypercut"
          popd >/dev/null

      - name: Verify ZIP contents (top-level folder exists)
        shell: bash
        run: |
          set -euo pipefail
          ZIP="dist/${{ steps.meta.outputs.zip_name }}"

          echo "ZIP listing (first 80 lines):"
          zipinfo -1 "$ZIP" | head -80

          # Ensure module lives under paypercut/
          zipinfo -1 "$ZIP" | grep -x "paypercut/" >/dev/null
          zipinfo -1 "$ZIP" | grep -x "paypercut/config.xml" >/dev/null
          zipinfo -1 "$ZIP" | grep -x "paypercut/index.php" >/dev/null

      - name: Create GitHub Release + upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/${{ steps.meta.outputs.zip_name }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/${{ steps.meta.outputs.zip_name }}
